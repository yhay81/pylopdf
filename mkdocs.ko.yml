site_name: pylopdf
site_url: https://yhay81.github.io/pylopdf/ko/
site_description: Rust를 핵심으로 한 Python다운 PDF 편집, 추출, 렌더링 라이브러리. MIT 라이선스, 런타임 의존성 없음, 경량 wheel.
site_author: Yusuke Hayashi
copyright: Copyright &copy; 2026 Yusuke Hayashi · MIT License
repo_url: https://github.com/yhay81/pylopdf
repo_name: yhay81/pylopdf
edit_uri: edit/main/docs/ko/
docs_dir: docs/ko
site_dir: site/ko

theme:
  name: material
  variant: modern
  language: ko
  custom_dir: docs/overrides
  font: false
  icon:
    logo: material/file-document-edit-outline
    repo: fontawesome/brands/github
    alternate: material/translate
  features:
    - announce.dismiss
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환

nav:
  - 홈: index.md
  - 가이드:
      - 시작하기: getting-started.md
      - 생태계 연동: ecosystem.md
      - pymupdf에서 이전: migration.md
  - API: api.md
  - 프로젝트:
      - 벤치마크: benchmarks.md
      - 동시성: concurrency.md
      - 보안: security.md
      - 언어 정책: languages.md
  - 변경 이력: https://github.com/yhay81/pylopdf/blob/main/CHANGELOG.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  current_language: ko
  announcement: "pylopdf 0.9.0 · OCR 비가시 텍스트 레이어, Markdown 변환, 폼 입력, PDF/A 선언 읽기"
  announcement_url: "https://github.com/yhay81/pylopdf/releases/tag/v0.9.0"
  social_image: "https://yhay81.github.io/pylopdf/assets/images/pylopdf-social-card.png"
  alternate:
    - name: English
      link: https://yhay81.github.io/pylopdf/
      lang: en
    - name: 日本語
      link: https://yhay81.github.io/pylopdf/ja/
      lang: ja
    - name: 简体中文
      link: https://yhay81.github.io/pylopdf/zh-cn/
      lang: zh-Hans
    - name: 한국어
      link: https://yhay81.github.io/pylopdf/ko/
      lang: ko
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yhay81/pylopdf
      name: GitHub의 pylopdf
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pylopdf/
      name: PyPI의 pylopdf
