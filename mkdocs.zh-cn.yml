site_name: pylopdf
site_url: https://yhay81.github.io/pylopdf/zh-cn/
site_description: 以Rust为核心、符合Python使用习惯的PDF编辑、提取与渲染库。MIT许可、零运行时依赖、轻量wheel。
site_author: Yusuke Hayashi
copyright: Copyright &copy; 2026 Yusuke Hayashi · MIT License
repo_url: https://github.com/yhay81/pylopdf
repo_name: yhay81/pylopdf
edit_uri: edit/main/docs/zh-cn/
docs_dir: docs/zh-cn
site_dir: site/zh-cn

theme:
  name: material
  variant: modern
  language: zh
  custom_dir: docs/overrides
  font: false
  icon:
    logo: material/file-document-edit-outline
    repo: fontawesome/brands/github
    alternate: material/translate
  features:
    - announce.dismiss
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 指南:
      - 快速开始: getting-started.md
      - 生态系统方案: ecosystem.md
      - 从pymupdf迁移: migration.md
  - API: api.md
  - 项目:
      - 性能基准: benchmarks.md
      - 并发: concurrency.md
      - 安全: security.md
      - 语言政策: languages.md
  - 更新日志: https://github.com/yhay81/pylopdf/blob/main/CHANGELOG.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  current_language: zh-Hans
  announcement: "pylopdf 0.9.0 · OCR不可见文本层、Markdown转换、表单填写、PDF/A声明读取"
  announcement_url: "https://github.com/yhay81/pylopdf/releases/tag/v0.9.0"
  social_image: "https://yhay81.github.io/pylopdf/assets/images/pylopdf-social-card.png"
  alternate:
    - name: English
      link: https://yhay81.github.io/pylopdf/
      lang: en
    - name: 日本語
      link: https://yhay81.github.io/pylopdf/ja/
      lang: ja
    - name: 简体中文
      link: https://yhay81.github.io/pylopdf/zh-cn/
      lang: zh-Hans
    - name: 한국어
      link: https://yhay81.github.io/pylopdf/ko/
      lang: ko
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yhay81/pylopdf
      name: GitHub上的pylopdf
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pylopdf/
      name: PyPI上的pylopdf
