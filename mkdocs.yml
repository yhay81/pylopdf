site_name: pylopdf
site_url: https://yhay81.github.io/pylopdf/
site_description: Python-native PDF editing, extraction and rendering, powered by Rust. MIT licensed, zero runtime dependencies, lightweight wheels.
site_author: Yusuke Hayashi
copyright: Copyright &copy; 2026 Yusuke Hayashi · MIT License
repo_url: https://github.com/yhay81/pylopdf
repo_name: yhay81/pylopdf
edit_uri: edit/main/docs/en/
docs_dir: docs/en
site_dir: site

theme:
  name: material
  variant: modern
  language: en
  custom_dir: docs/overrides
  font: false
  icon:
    logo: material/file-document-edit-outline
    repo: fontawesome/brands/github
    alternate: material/translate
  features:
    - announce.dismiss
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Guide:
      - Getting started: getting-started.md
      - Ecosystem recipes: ecosystem.md
      - Migrating from pymupdf: migration.md
  - API: api.md
  - Project:
      - Benchmarks: benchmarks.md
      - Concurrency: concurrency.md
      - Security: security.md
      - Languages: languages.md
  - Changelog: https://github.com/yhay81/pylopdf/blob/main/CHANGELOG.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  current_language: en
  announcement: "pylopdf 0.9.0 · OCR layers, Markdown conversion, forms and PDF/A claim reading"
  announcement_url: "https://github.com/yhay81/pylopdf/releases/tag/v0.9.0"
  social_image: "https://yhay81.github.io/pylopdf/assets/images/pylopdf-social-card.png"
  alternate:
    - name: English
      link: https://yhay81.github.io/pylopdf/
      lang: en
    - name: 日本語
      link: https://yhay81.github.io/pylopdf/ja/
      lang: ja
    - name: 简体中文
      link: https://yhay81.github.io/pylopdf/zh-cn/
      lang: zh-Hans
    - name: 한국어
      link: https://yhay81.github.io/pylopdf/ko/
      lang: ko
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yhay81/pylopdf
      name: pylopdf on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pylopdf/
      name: pylopdf on PyPI
