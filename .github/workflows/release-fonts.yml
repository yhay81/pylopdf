# Font wheel release CI: publish pylopdf-fonts-cjk to PyPI on a fonts-v* tag.
#
# Publishing requires a Trusted Publisher configured on PyPI:
#   PyPI → project pylopdf-fonts-cjk → Publishing → GitHub
#   owner: yhay81 / repository: pylopdf / workflow: release-fonts.yml / environment: pypi
name: Release fonts

on:
  push:
    tags: ["fonts-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish pylopdf-fonts-cjk
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Job-level permissions replace the top-level block, so contents: read
      # must be repeated or actions/checkout fails with "Repository not found".
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
      - name: Build sdist and wheel
        run: uv build --package pylopdf-fonts-cjk --out-dir dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
