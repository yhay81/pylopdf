# Deploy the Zensical documentation site (EN/JA/zh-CN/KO) to GitHub Pages.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "mkdocs.ja.yml"
      - "mkdocs.zh-cn.yml"
      - "mkdocs.ko.yml"
      - "LANGUAGES.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
      - name: Install docs toolchain (no Rust build)
        run: uv sync --only-group docs --no-install-project
      - name: Build English site (strict)
        run: uv run --no-sync zensical build -f mkdocs.yml -c -s
      - name: Build Japanese site (strict)
        run: uv run --no-sync zensical build -f mkdocs.ja.yml -c -s
      - name: Build Simplified Chinese site (strict)
        run: uv run --no-sync zensical build -f mkdocs.zh-cn.yml -c -s
      - name: Build Korean site (strict)
        run: uv run --no-sync zensical build -f mkdocs.ko.yml -c -s
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
