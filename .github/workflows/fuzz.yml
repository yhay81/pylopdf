name: Fuzz

on:
  schedule:
    - cron: "17 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    name: public API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: astral-sh/setup-uv@v9.0.0
      - name: Build fuzz environment
        run: uv sync --group fuzz --python 3.13
      - name: Fuzz public workflows
        run: |
          mkdir -p "${RUNNER_TEMP}/pylopdf-fuzz-corpus"
          uv run python fuzz/fuzz_api.py \
            -max_total_time=600 \
            -timeout=15 \
            -rss_limit_mb=2048 \
            -max_len=1048576 \
            "${RUNNER_TEMP}/pylopdf-fuzz-corpus" \
            tests/assets/real_world
