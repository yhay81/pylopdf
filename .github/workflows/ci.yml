# Test CI: run linting, type checking, and tests on three operating systems
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Audit the Rust dependency tree against the RustSec advisory database.
  audit:
    name: audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@cargo-audit
      - name: Rust dependency audit
        run: cargo audit --file rust/Cargo.lock

  # Validate the abi3-py310 floor with the oldest supported Python version.
  test-py310:
    name: test (Python 3.10 lower bound)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: astral-sh/setup-uv@v9.0.0
      - name: Build and install (Python 3.10)
        run: uv sync --all-extras --group interop --python 3.10
      - name: Test
        run: uv run pytest

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: astral-sh/setup-uv@v9.0.0
      - name: Rust format check
        run: cargo fmt --manifest-path rust/Cargo.toml --check
      - name: Rust lint
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings
      - name: Build and install
        # The interop group tests the ecosystem recipes documented in the README.
        run: uv sync --all-extras --group interop
      - name: Validate project metadata
        run: uv run pre-commit run validate-pyproject --all-files
      - name: Python lint
        run: uv run ruff check .
      - name: Repository language
        run: uv run python tools/check_repository_language.py
      - name: Python format check
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy src tests
      - name: Test
        run: uv run pytest
