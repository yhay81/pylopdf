# Release CI: build wheels for every platform and publish on a v* tag.
#
# Publishing requires a Trusted Publisher configured on PyPI:
#   PyPI → project pylopdf → Publishing → GitHub
#   owner: yhay81 / repository: pylopdf / workflow: release.yml / environment: pypi
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: wheel (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64-unknown-linux-gnu, smoke: true }
          - { runner: ubuntu-latest, target: aarch64-unknown-linux-gnu, smoke: false }
          - { runner: macos-latest, target: aarch64-apple-darwin, smoke: true }
          # Cross-compile x86_64 on arm64 because Intel runner queues are slow.
          - { runner: macos-latest, target: x86_64-apple-darwin, smoke: false }
          - { runner: windows-latest, target: x86_64-pc-windows-msvc, smoke: true }
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/setup-python@v6
        if: matrix.platform.smoke
        with:
          python-version: "3.14"
      - name: Smoke-test installed wheel
        if: matrix.platform.smoke
        run: python tools/smoke_artifact.py dist --pattern "*.whl"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.target }}
          path: dist

  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Smoke-test installed sdist
        run: python tools/smoke_artifact.py dist --pattern "*.tar.gz"
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
