name: Bug report
description: Report incorrect PDF parsing, editing, extraction, rendering, or packaging behavior.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Search existing issues and test the latest release when possible.
        Never upload a confidential PDF. Only share files that you may legally redistribute.
  - type: input
    id: version
    attributes:
      label: pylopdf version
      placeholder: "0.9.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Python and operating system
      placeholder: "Python 3.14.0 on Windows 11 x86-64"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Opening or saving
        - Text extraction or search
        - Rendering
        - Page editing or merging
        - Drawing or annotations
        - Forms, attachments, labels, or outlines
        - Encryption
        - Packaging or installation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Include complete Python code and, when possible, a script that generates the PDF.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the complete traceback and any PylopdfWarning messages.
    validations:
      required: true
  - type: textarea
    id: pdf
    attributes:
      label: PDF source and license
      description: Link or attach a minimal redistributable PDF, or explain why one cannot be shared.
      placeholder: "Generated by the reproducer above, or source URL + license."
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed private data and may legally redistribute any attached PDF.
          required: true
        - label: This is not a security vulnerability.
          required: true
