site_name: pylopdf
site_url: https://yhay81.github.io/pylopdf/ja/
site_description: Rustを核にしたPythonネイティブなPDF編集・抽出・レンダリング。MITライセンス、実行時依存ゼロ、軽量wheel。
site_author: Yusuke Hayashi
copyright: Copyright &copy; 2026 Yusuke Hayashi · MIT License
repo_url: https://github.com/yhay81/pylopdf
repo_name: yhay81/pylopdf
edit_uri: edit/main/docs/ja/
docs_dir: docs/ja
site_dir: site/ja

theme:
  name: material
  variant: modern
  language: ja
  custom_dir: docs/overrides
  font: false
  icon:
    logo: material/file-document-edit-outline
    repo: fontawesome/brands/github
    alternate: material/translate
  features:
    - announce.dismiss
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: ダークモードへ切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ切り替え

nav:
  - ホーム: index.md
  - ガイド:
      - はじめる: getting-started.md
      - エコシステム連携: ecosystem.md
      - pymupdfからの移行: migration.md
  - API: api.md
  - プロジェクト:
      - ベンチマーク: benchmarks.md
      - セキュリティ: security.md
  - 変更履歴: https://github.com/yhay81/pylopdf/blob/main/CHANGELOG.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  announcement: "pylopdf 0.9.0 · OCR不可視層、Markdown変換、フォーム記入、PDF/A宣言読み取り"
  announcement_url: "https://github.com/yhay81/pylopdf/releases/tag/v0.9.0"
  social_image: "https://yhay81.github.io/pylopdf/assets/images/pylopdf-social-card.png"
  alternate:
    - name: English
      link: https://yhay81.github.io/pylopdf/
      lang: en
    - name: 日本語
      link: https://yhay81.github.io/pylopdf/ja/
      lang: ja
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yhay81/pylopdf
      name: GitHubのpylopdf
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pylopdf/
      name: PyPIのpylopdf
